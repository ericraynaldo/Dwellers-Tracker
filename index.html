<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dwellers Tracker</title>

<style>
body {
  font-family: Arial;
  background: #ffffff;
  color: #000;
  margin: 0;
}

.header {
  background: #2563eb;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  position: relative;
}

.clock {
  position: absolute;
  right: 15px;
  top: 15px;
  font-size: 14px;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #f1f5f9;
  padding: 15px;
  border-radius: 12px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 5px 0 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: bold;
}

.result {
  background: #e2e8f0;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
}

.links {
  margin-top: 15px;
}

.links a {
  display: block;
  margin-bottom: 5px;
  color: #2563eb;
}
</style>
</head>

<body>

<div class="header">
  Dwellers Tracker
  <div class="clock" id="clock"></div>
</div>

<div class="container">

<div class="card">

<label>Level</label>
<input type="number" id="level">

<label>Endurance</label>
<input type="number" id="endurance">

<label>Stimpack</label>
<input type="number" id="stim">

<label>RadAway</label>
<input type="number" id="rad">

<label>Weapon Min</label>
<input type="number" id="weaponMin">

<label>Weapon Max</label>
<input type="number" id="weaponMax">

<label>Notif sebelum mati (menit)</label>
<input type="number" id="buffer" value="30">

<button onclick="calculate()">Calculate</button>

<div class="result" id="output"></div>

<div class="links">
  <b>Referensi Data:</b>
  <a href="https://fallout.fandom.com/wiki/Fallout_Shelter" target="_blank">Fallout Wiki</a>
  <a href="https://fallout.fandom.com/wiki/Weapons_(Fallout_Shelter)" target="_blank">Weapon Database</a>
</div>

</div>
</div>

<script>

// ⏰ CLOCK
function updateClock() {
  document.getElementById("clock").innerHTML =
    new Date().toLocaleString();
}
setInterval(updateClock, 1000);


// 🔥 SIMULATION FIXED
function calculate() {

  let L = +level.value || 1;
  let E = +endurance.value || 1;
  let S = +stim.value || 0;
  let R = +rad.value || 0;
  let minW = +weaponMin.value || 1;
  let maxW = +weaponMax.value || 1;
  let buffer = +buffer.value || 30;

  let playerDPS = (minW + maxW) / 2;

  // 🔥 FIX MIN DPS
  if (playerDPS < 5) playerDPS = 5;

  let maxHP = 120 + (L * 12) + (E * 25);
  let hp = maxHP;

  let stim = S;
  let rad = R;

  let time = 0;

  while (hp > 0 && time < 200000) {

    let minute = time / 60;
    let difficulty = 1 + (minute * 0.04);

    let rand = Math.random();

    let enemyHP = rand < 0.5 ? 25 : rand < 0.8 ? 45 : 70;
    let enemyDPS = rand < 0.5 ? 1.5 : rand < 0.8 ? 3 : 5;

    enemyHP *= difficulty;
    enemyDPS *= difficulty;

    let fightTime = enemyHP / playerDPS;

    // 🔥 LIMIT BIAR GA OVER
    if (fightTime > 8) fightTime = 8;

    let damage = enemyDPS * fightTime;

    hp -= damage;

    // 💉 HEAL LOGIC
    if (hp < maxHP * 0.35 && stim > 0) {
      hp += 120;
      stim--;
    }

    if (hp < maxHP * 0.6 && rad > 0) {
      hp += 60;
      rad--;
    }

    // 🔥 JEDA ANTAR FIGHT
    let idle = Math.random() * 5;

    time += fightTime + idle;

    if (hp <= 0) break;
  }

  let survival = Math.floor(time / 60);
  if (survival < 1) survival = 1;

  let now = new Date();

  let death = new Date(now.getTime() + survival * 60000);

  let notif = survival - buffer;
  if (notif < 1) notif = 1;

  let notifTime = new Date(now.getTime() + notif * 60000);

  output.innerHTML =
    "⏱ Bertahan: <b>" + survival + " menit</b><br><br>" +
    "💀 Mati: <b>" + death.toLocaleString() + "</b><br><br>" +
    "🔔 Notif: <b>" + notifTime.toLocaleString() + "</b>";

  startNotification(notif);
}


// 🔔 NOTIF
function startNotification(min) {
  if (Notification.permission !== "granted") {
    Notification.requestPermission();
  }

  setTimeout(() => {
    new Notification("⚠️ Recall Dweller!", {
      body: "Sudah mendekati batas aman!"
    });
  }, min * 60000);
}

</script>

</body>
</html>
