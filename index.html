<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dwellers Tracker</title>

<style>
body {
  margin: 0;
  font-family: "Courier New", monospace;
  background: #000;
  color: #00ff88;
}

.header {
  background: #001a0d;
  padding: 15px;
  text-align: center;
  border-bottom: 1px solid #00ff88;
  position: relative;
  font-size: 18px;
}

.clock {
  position: absolute;
  right: 10px;
  top: 10px;
  font-size: 12px;
}

.main {
  display: flex;
  flex-wrap: wrap;
}

/* LEFT PANEL */
.left {
  width: 300px;
  max-width: 100%;
  padding: 15px;
  border-right: 1px solid #00ff88;
}

/* RIGHT PANEL */
.right {
  flex: 1;
  min-height: 300px;
  padding: 15px;
}

input {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
  background: black;
  color: #00ff88;
  border: 1px solid #00ff88;
}

button {
  width: 100%;
  padding: 10px;
  background: #003311;
  color: #00ff88;
  border: 1px solid #00ff88;
  cursor: pointer;
}

button:hover {
  background: #005522;
}

.log {
  white-space: pre-line;
  font-size: 12px;
}

/* 📱 MOBILE FIX */
@media (max-width: 768px) {
  .main {
    flex-direction: column;
  }

  .left {
    width: 100%;
    border-right: none;
    border-bottom: 1px solid #00ff88;
  }

  .right {
    width: 100%;
  }
}
</style>
</head>

<body>

<div class="header">
  Dwellers Tracker Terminal
  <div class="clock" id="clock"></div>
</div>

<div class="main">

<div class="left">
<label>Level</label>
<input type="number" id="level">

<label>Endurance</label>
<input type="number" id="endurance">

<label>Luck</label>
<input type="number" id="luck">

<label>Stimpack</label>
<input type="number" id="stim">

<label>RadAway</label>
<input type="number" id="rad">

<label>Weapon Min</label>
<input type="number" id="weaponMin">

<label>Weapon Max</label>
<input type="number" id="weaponMax">

<label>Notif Buffer (min)</label>
<input type="number" id="buffer" value="30">

<button id="calcBtn">RUN SIMULATION</button>
</div>

<div class="right">
<div class="log" id="log">>> System Ready...</div>
</div>

</div>

<script>

// CLOCK
setInterval(() => {
  document.getElementById("clock").innerText =
    new Date().toLocaleString();
}, 1000);

// BUTTON
document.getElementById("calcBtn").addEventListener("click", calculate);


// SIMULATION
function calculate() {

  let log = ">> Initializing simulation...\n";

  let L = +level.value || 1;
  let E = +endurance.value || 1;
  let Luck = +luck.value || 1;
  let S = +stim.value || 0;
  let R = +rad.value || 0;
  let minW = +weaponMin.value || 1;
  let maxW = +weaponMax.value || 1;
  let bufferVal = +buffer.value || 30;

  let playerDPS = (minW + maxW) / 2;

  // min DPS biar ga useless
  if (playerDPS < 5) playerDPS = 5;

  // LUCK EFFECT (crit)
  let critChance = Math.min(0.1 + Luck * 0.02, 0.5);
  let dodgeChance = Math.min(0.05 + Luck * 0.015, 0.4);

  let maxHP = 120 + (L * 12) + (E * 25);
  let hp = maxHP;

  let stim = S;
  let rad = R;
  let time = 0;

  log += ">> HP: " + maxHP + "\n";
  log += ">> DPS: " + playerDPS + "\n";
  log += ">> Crit: " + Math.floor(critChance*100) + "%\n";
  log += ">> Dodge: " + Math.floor(dodgeChance*100) + "%\n\n";

  while (hp > 0 && time < 200000) {

    let minute = time / 60;
    let difficulty = 1 + (minute * 0.02);

    let rand = Math.random();

    let enemyHP = rand < 0.5 ? 25 : rand < 0.8 ? 45 : 70;
    let enemyDPS = rand < 0.5 ? 1 : rand < 0.8 ? 2 : 3.5;

    enemyHP *= difficulty;
    enemyDPS *= difficulty;

    // CRIT
    let damageMultiplier = Math.random() < critChance ? 2 : 1;

    let fightTime = enemyHP / (playerDPS * damageMultiplier);
    if (fightTime > 8) fightTime = 8;

    let damage = enemyDPS * fightTime;

    // DODGE
    if (Math.random() < dodgeChance) {
      damage = 0;
      log += ">> Dodge!\n";
    }

    hp -= damage;

    if (hp < maxHP * 0.35 && stim > 0) {
      hp += 120;
      stim--;
      log += ">> Stimpack used\n";
    }

    if (hp < maxHP * 0.6 && rad > 0) {
      hp += 60;
      rad--;
      log += ">> RadAway used\n";
    }

    let idle = 5 + Math.random() * 15;
    time += fightTime + idle;

    log += ">> Time: " + Math.floor(time/60) + "m | HP: " + Math.floor(hp) + "\n";

    if (hp <= 0) break;
  }

  let survival = Math.floor(time / 60);
  if (survival < 1) survival = 1;

  let now = new Date();
  let death = new Date(now.getTime() + survival * 60000);

  let notif = survival - bufferVal;
  if (notif < 1) notif = 1;

  let notifTime = new Date(now.getTime() + notif * 60000);

  log += "\n>> RESULT\n";
  log += ">> Survival: " + survival + " minutes\n";
  log += ">> Death: " + death.toLocaleString() + "\n";
  log += ">> Alert: " + notifTime.toLocaleString();

  document.getElementById("log").innerText = log;
}

</script>

</body>
</html>
