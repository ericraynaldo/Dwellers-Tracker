<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Dwellers Tracker V1.2</title>

<link rel="manifest" href="manifest.json">

<style>

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: black;
  color: #00ff88;
  font-family: "Courier New", monospace;
}

.app {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.header {
  padding: 10px;
  background: #001a0d;
  border-bottom: 2px solid #00ff88;
  position: sticky;
  top: 0;
}

.title { font-size: 15px; }
.version { font-size: 11px; opacity: 0.8; }
.clock { font-size: 11px; }

.input-section {
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

input {
  padding: 8px;
  background: black;
  border: 1px solid #00ff88;
  color: #00ff88;
}

button {
  padding: 10px;
  background: #003311;
  border: 1px solid #00ff88;
  color: #00ff88;
}

.log {
  margin: 10px;
  border: 1px solid #00ff88;
  background: rgba(0,255,136,0.05);
  font-size: 12px;
  padding: 8px;
}

#logText {
  white-space: pre-wrap;
}

.footer {
  margin-top: auto;
  padding: 10px;
  text-align: center;
  border-top: 2px solid #00ff88;
  background: #001a0d;
  font-size: 11px;
}

</style>

</head>

<body>

<div class="app">

<div class="header">
  <div class="title">Dwellers Tracker</div>
  <div class="version">V1.2 REALISTIC ENGINE</div>
  <div class="clock" id="clock"></div>
</div>

<div class="input-section">

<input id="level" placeholder="Level">
<input id="endurance" placeholder="Endurance">
<input id="luck" placeholder="Luck">
<input id="stim" placeholder="Stimpack">
<input id="rad" placeholder="RadAway">

<input id="weaponMin" placeholder="Weapon Min">
<input id="weaponMax" placeholder="Weapon Max">

<button id="btn">ACTIVATE</button>

</div>

<div class="log">
  <div id="logText">>> READY</div>
</div>

<div class="footer">
  Dwellers Tracker V1.2 — Real Survival Simulation
</div>

</div>

<script>

/* CLOCK */
setInterval(() => {
  document.getElementById("clock").innerText =
    new Date().toLocaleString();
}, 1000);

const val = (id) =>
  Number(document.getElementById(id)?.value || 0);

/* LOG */
function typeLog(text){
  document.getElementById("logText").innerText = text;
}

/* CORE SIMULATION */
document.getElementById("btn").addEventListener("click", simulate);

function simulate(){

let log = ">> SIMULATION START\n\n";

let L = val("level") || 1;
let E = val("endurance") || 1;
let Luck = val("luck") || 1;
let stim = val("stim") || 0;
let rad = val("rad") || 0;

let wMin = val("weaponMin") || 1;
let wMax = val("weaponMax") || 1;

/* STATE */
let level = L;
let maxHP = 100 + (level * (3 + E * 0.8));
let hp = maxHP;

let radDamage = 0;
let time = 0;

log += "START HP: " + Math.floor(hp) + "\n";

while(hp > 0 && time < 20000){

/* LEVEL UP SYSTEM */
if(Math.random() < 0.02){
  level++;

  let oldMax = maxHP;

  maxHP = 100 + (level * (3 + E * 0.8));

  hp = maxHP; // FULL HEAL

  log += "LEVEL UP (" + oldMax + " → " + maxHP + ") FULL HEAL\n";
}

/* RAD DAMAGE SYSTEM (PERMANENT PRESSURE) */
if(rad > 0 && Math.random() < 0.3){
  radDamage += 5;
  rad--;
  log += "RAD INCREASED\n";
}

/* EFFECTIVE MAX HP */
let effectiveMaxHP = maxHP - radDamage;
if(hp > effectiveMaxHP) hp = effectiveMaxHP;

/* WEAPON SYSTEM */
let weapon = (wMin + wMax) / 2;

/* DAMAGE MODEL (REALISTIC CURVE) */
let baseDamage = 1.2;
let enduranceReduce = 1 - (E * 0.04);
let luckVariance = 0.8 + Math.random() * (1 + Luck * 0.02);

let dmg = (baseDamage + weapon * 0.05) * enduranceReduce * luckVariance;

/* ENCOUNTER SYSTEM (IMPORTANT FIX) */
let encounterChance = 0.45 + (L * 0.01);

if(Math.random() < encounterChance){
  hp -= dmg;
} else {
  log += "idle...\n";
}

/* STIM SYSTEM */
if(hp < effectiveMaxHP * 0.35 && stim > 0){
  hp += 60;
  stim--;
  log += "stim used\n";
}

/* TIME PROGRESSION (VARIATIVE, NOT FIXED LOOP) */
time += 8 + Math.random() * 18;

log += "t:" + Math.floor(time/60) + "m hp:" + Math.floor(hp) + "\n";

}

let survive = Math.floor(time / 60);
if(survive < 1) survive = 1;

log += "\nRESULT\n";
log += "survive: " + survive + " min";

typeLog(log);

}

</script>

</body>
</html>
