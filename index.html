<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dwellers Tracker</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #ffffff;
  color: #000;
  margin: 0;
}

.header {
  background: #2563eb;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  position: relative;
}

.clock {
  position: absolute;
  right: 15px;
  top: 15px;
  font-size: 14px;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #f1f5f9;
  padding: 15px;
  border-radius: 12px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 5px 0 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

.result {
  background: #e2e8f0;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">
  Dwellers Tracker
  <div class="clock" id="clock"></div>
</div>

<div class="container">

<div class="card">

<label>Level</label>
<input type="number" id="level" placeholder="contoh: 10">

<label>Endurance</label>
<input type="number" id="endurance">

<label>Stimpack</label>
<input type="number" id="stim">

<label>RadAway</label>
<input type="number" id="rad">

<label>Weapon Min Damage</label>
<input type="number" id="weaponMin">

<label>Weapon Max Damage</label>
<input type="number" id="weaponMax">

<label>Notif sebelum mati (menit)</label>
<input type="number" id="buffer" value="30">

<button onclick="calculate()">Calculate</button>

<div class="result" id="output"></div>

</div>
</div>

<script>

// ⏰ JAM REALTIME
function updateClock() {
  document.getElementById("clock").innerHTML =
    new Date().toLocaleString();
}
setInterval(updateClock, 1000);
updateClock();


// 🔥 SIMULASI (SUDAH FIX)
function calculate() {

  let L = +document.getElementById("level").value || 1;
  let E = +document.getElementById("endurance").value || 1;
  let S = +document.getElementById("stim").value || 0;
  let R = +document.getElementById("rad").value || 0;
  let minW = +document.getElementById("weaponMin").value || 1;
  let maxW = +document.getElementById("weaponMax").value || 1;
  let bufferVal = +document.getElementById("buffer").value || 30;

  // 🔫 weapon avg damage
  let playerDPS = (minW + maxW) / 2;

  // 🔥 biar ga terlalu lemah
  if (playerDPS < 5) playerDPS = 5;

  // ❤️ HP system
  let maxHP = 120 + (L * 12) + (E * 25);
  let hp = maxHP;

  let stim = S;
  let rad = R;

  let time = 0;

  while (hp > 0 && time < 200000) {

    let minute = time / 60;
    let difficulty = 1 + (minute * 0.04);

    let rand = Math.random();

    let enemyHP = rand < 0.5 ? 25 : rand < 0.8 ? 45 : 70;
    let enemyDPS = rand < 0.5 ? 1.5 : rand < 0.8 ? 3 : 5;

    enemyHP *= difficulty;
    enemyDPS *= difficulty;

    let fightTime = enemyHP / playerDPS;

    // 🔥 limit biar realistis
    if (fightTime > 8) fightTime = 8;

    let damage = enemyDPS * fightTime;
    hp -= damage;

    // 💉 stimpack
    if (hp < maxHP * 0.35 && stim > 0) {
      hp += 120;
      stim--;
    }

    // ☢️ radaway
    if (hp < maxHP * 0.6 && rad > 0) {
      hp += 60;
      rad--;
    }

    // 💤 jeda antar fight
    let idle = Math.random() * 5;

    time += fightTime + idle;

    if (hp <= 0) break;
  }

  let survival = Math.floor(time / 60);
  if (survival < 1) survival = 1;

  let now = new Date();

  let death = new Date(now.getTime() + survival * 60000);

  let notif = survival - bufferVal;
  if (notif < 1) notif = 1;

  let notifTime = new Date(now.getTime() + notif * 60000);

  document.getElementById("output").innerHTML =
    "⏱ Bertahan: <b>" + survival + " menit</b><br><br>" +
    "💀 Estimasi mati:<br><b>" + death.toLocaleString() + "</b><br><br>" +
    "🔔 Notif:<br><b>" + notifTime.toLocaleString() + "</b>";
}

</script>

</body>
</html>
