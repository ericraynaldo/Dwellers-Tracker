<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">

<title>Dwellers Tracker V3.1</title>

<style>

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: black;
  color: #00ff88;
  font-family: "Courier New", monospace;
}

.app {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* HEADER RESTORED */
.header {
  padding: 10px;
  background: #001a0d;
  border-bottom: 2px solid #00ff88;
  position: sticky;
  top: 0;
}

.title { font-size: 15px; }
.version { font-size: 11px; opacity: 0.8; }
.clock { font-size: 11px; margin-top: 3px; }

/* INPUT */
.input-section {
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

input {
  padding: 8px;
  background: black;
  border: 1px solid #00ff88;
  color: #00ff88;
}

button {
  padding: 10px;
  background: #003311;
  border: 1px solid #00ff88;
  color: #00ff88;
}

/* RESULT */
.result {
  margin: 10px;
  padding: 12px;
  border: 1px solid #00ff88;
  min-height: 140px;
  white-space: pre-wrap;
}

/* FOOTER RESTORED */
.footer {
  margin-top: auto;
  padding: 10px;
  text-align: center;
  border-top: 2px solid #00ff88;
  background: #001a0d;
  font-size: 11px;
}

/* subtle glow */
.header, .footer {
  box-shadow: 0 0 10px rgba(0,255,136,0.15);
}

</style>

</head>

<body>

<div class="app">

<!-- HEADER -->
<div class="header">
  <div class="title">Dwellers Tracker</div>
  <div class="version">V3.1 BALANCED SIM ENGINE</div>
  <div class="clock" id="clock"></div>
</div>

<!-- INPUT -->
<div class="input-section">

<input id="level" placeholder="Level">
<input id="endurance" placeholder="Endurance">
<input id="luck" placeholder="Luck">
<input id="stim" placeholder="Stimpack">
<input id="rad" placeholder="RadAway">

<input id="weaponMin" placeholder="Weapon Min">
<input id="weaponMax" placeholder="Weapon Max">

<button onclick="simulate()">SIMULATE</button>

</div>

<!-- RESULT -->
<div class="result" id="result">>> READY</div>

<!-- FOOTER -->
<div class="footer">
  Wasteland Simulation Core — Vault-Tec Inspired Survival Engine
</div>

</div>

<script>

/* CLOCK */
setInterval(() => {
  document.getElementById("clock").innerText =
    new Date().toLocaleString();
}, 1000);

const val = (id) =>
  Number(document.getElementById(id)?.value || 0);

/* TYPE EFFECT */
function type(text){
  const el = document.getElementById("result");
  el.innerText = "";

  let i = 0;

  function step(){
    if(i < text.length){
      el.innerText += text[i++];
      setTimeout(step, 6);
    }
  }

  step();
}

/* SIMULATION CORE (UNCHANGED BALANCED VERSION) */
function simulate(){

let L = val("level") || 1;
let E = val("endurance") || 1;
let Luck = val("luck") || 1;

let stim = val("stim") || 0;
let rad = val("rad") || 0;

let wMin = val("weaponMin") || 1;
let wMax = val("weaponMax") || 1;

/* HP SYSTEM */
let level = L;
let maxHP = 100 + (level * (4 + E * 1.2));
let hp = maxHP;

let time = 0;

/* LOOP */
while(hp > 0 && time < 10000){

let danger = 1 + (time / 2000);
let weapon = (wMin + wMax) / 2;

let enduranceFactor = Math.max(0.5, 1 - (E * 0.10));
let luckVar = 0.85 + Math.random() * 0.3 + (Luck * 0.01);

let encounterChance = Math.min(0.75, 0.55 + (time / 12000));

let dmg = (1.4 + weapon * 0.08)
        * enduranceFactor
        * luckVar
        * danger;

if(Math.random() < encounterChance){

  if(Math.random() < 0.08){
    dmg *= 1.5;
  }

  hp -= dmg;

} else {
  if(Math.random() < 0.12){
    hp += 1.5;
    if(hp > maxHP) hp = maxHP;
  }
}

/* STIM */
if(hp < maxHP * 0.35 && stim > 0){
  hp += 60;
  stim--;
}

/* LEVEL UP */
if(Math.random() < 0.015){
  level++;
  maxHP = 100 + (level * (4 + E * 1.2));
  hp = maxHP;
}

/* TIME */
time += 12 + Math.random() * 10;

}

/* RESULT */
let surviveMin = Math.floor(time / 60);
if(surviveMin < 1) surviveMin = 1;

let death = new Date(Date.now() + surviveMin * 60000);

let h = Math.floor(surviveMin / 60);
let m = surviveMin % 60;

let result =
`YOUR DWELLER SURVIVAL ESTIMATE

≈ ${h} HOURS ${m} MINUTES

DEATH TIME:
${death.toLocaleString()}`;

type(result);

}

</script>

</body>
</html>
