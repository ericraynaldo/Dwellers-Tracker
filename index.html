<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Dwellers Tracker V1.5</title>

<link rel="manifest" href="manifest.json">

<style>

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: black;
  color: #00ff88;
  font-family: "Courier New", monospace;
}

.app {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.header {
  padding: 10px;
  background: #001a0d;
  border-bottom: 2px solid #00ff88;
  position: sticky;
  top: 0;
}

.title { font-size: 15px; }
.version { font-size: 11px; opacity: 0.8; }
.clock { font-size: 11px; }

.input-section {
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

input {
  padding: 8px;
  background: black;
  border: 1px solid #00ff88;
  color: #00ff88;
}

button {
  padding: 10px;
  background: #003311;
  border: 1px solid #00ff88;
  color: #00ff88;
}

/* LOG WINDOW FIXED */
.log {
  margin: 10px;
  border: 1px solid #00ff88;
  background: rgba(0,255,136,0.05);
  font-size: 12px;
  padding: 8px;
  height: 220px;
  overflow: hidden;
}

#logText {
  white-space: pre-wrap;
  line-height: 1.3;
}

.footer {
  margin-top: auto;
  padding: 10px;
  text-align: center;
  border-top: 2px solid #00ff88;
  background: #001a0d;
  font-size: 11px;
}

</style>

</head>

<body>

<div class="app">

<div class="header">
  <div class="title">Dwellers Tracker</div>
  <div class="version">V1.5 HYBRID SIM</div>
  <div class="clock" id="clock"></div>
</div>

<div class="input-section">

<input id="level" placeholder="Level">
<input id="endurance" placeholder="Endurance">
<input id="luck" placeholder="Luck">
<input id="stim" placeholder="Stimpack">
<input id="rad" placeholder="RadAway">

<input id="weaponMin" placeholder="Weapon Min">
<input id="weaponMax" placeholder="Weapon Max">

<button id="btn">SIMULATE</button>

</div>

<div class="log">
  <div id="logText">>> READY</div>
</div>

<div class="footer">
  Wasteland Simulation Core
</div>

</div>

<script>

/* CLOCK */
setInterval(() => {
  document.getElementById("clock").innerText =
    new Date().toLocaleString();
}, 1000);

const val = (id) =>
  Number(document.getElementById(id)?.value || 0);

/* 🔥 LOG ENGINE (20 LINES WINDOW + TYPE ANIMATION) */
function createLogger(){

  const el = document.getElementById("logText");
  let buffer = "";
  let queue = [];
  let typing = false;

  function render(){
    let lines = buffer.split("\n");

    if(lines.length > 20){
      lines = lines.slice(-20);
    }

    el.innerText = lines.join("\n");
  }

  function push(text){
    queue.push(text);
    if(!typing) type();
  }

  function type(){

    typing = true;

    if(queue.length === 0){
      typing = false;
      return;
    }

    let text = queue.shift();
    let i = 0;

    function step(){
      if(i < text.length){
        buffer += text[i++];
        render();
        setTimeout(step, 4);
      } else {
        buffer += "\n";
        render();
        setTimeout(type, 10);
      }
    }

    step();
  }

  return { push, getBuffer: () => buffer };
}

/* SIMULATION */
document.getElementById("btn").addEventListener("click", simulate);

function simulate(){

const log = createLogger();

let L = val("level") || 1;
let E = val("endurance") || 1;
let Luck = val("luck") || 1;

let stim = val("stim") || 0;
let rad = val("rad") || 0;

let wMin = val("weaponMin") || 1;
let wMax = val("weaponMax") || 1;

/* STATE */
let level = L;
let maxHP = 100 + (level * (3 + E * 0.8));
let hp = maxHP;
let radDamage = 0;
let time = 0;

log.push(">> SIMULATION START");
log.push("HP: " + Math.floor(hp));

/* LOOP */
let interval = setInterval(() => {

if(hp <= 0 || time > 9000){
  clearInterval(interval);

  let surviveMin = Math.floor(time / 60);
  if(surviveMin < 1) surviveMin = 1;

  let deathDate = new Date(Date.now() + surviveMin * 60000);

  let d = Math.floor(surviveMin / 1440);
  let h = Math.floor((surviveMin % 1440) / 60);
  let m = surviveMin % 60;

  log.push(" ");
  log.push("RESULT");
  log.push(surviveMin + " min");
  log.push(d + "d " + h + "h " + m + "m");
  log.push(deathDate.toLocaleString());

  return;
}

/* LEVEL UP */
if(Math.random() < 0.02){
  level++;
  maxHP = 100 + (level * (3 + E * 0.8));
  hp = maxHP;
  log.push("LEVEL UP FULL HEAL");
}

/* RAD */
if(rad > 0 && Math.random() < 0.2){
  radDamage += 5;
  rad--;
  log.push("RAD +");
}

let effectiveMax = maxHP - radDamage;
if(hp > effectiveMax) hp = effectiveMax;

/* WEAPON */
let weapon = (wMin + wMax) / 2;

/* DAMAGE */
let baseDamage = 1.3;
let enduranceReduce = Math.max(0.55, 1 - (E * 0.08));
let luckVar = 0.8 + Math.random() * (1 + Luck * 0.02);
let dangerScale = 1 + (time / 1500);

let encounterChance = 0.7 + (time / 10000);

let dmg = (baseDamage + weapon * 0.07)
        * enduranceReduce
        * luckVar
        * dangerScale;

if(Math.random() < encounterChance){
  if(Math.random() < 0.12){
    dmg *= 1.8;
    log.push("RAID HIT!");
  }
  hp -= dmg;
} else {
  log.push("idle");
}

/* STIM */
if(hp < effectiveMax * 0.35 && stim > 0){
  hp += 60;
  stim--;
  log.push("stim");
}

/* TIME */
time += 10 + Math.random() * 12;

log.push("t:" + Math.floor(time/60) + "m hp:" + Math.floor(hp));

}, 60);

}

</script>

</body>
</html>
