<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">

<title>Dwellers Tracker V1.0</title>

<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  background: black;
  color: #00ff88;
  font-family: "Courier New", monospace;
}

/* HEADER */
.header {
  height: 55px;
  padding: 10px;
  background: #001a0d;
  border-bottom: 2px solid #00ff88;
}

.title {
  font-size: 15px;
}

.version {
  font-size: 10px;
  opacity: 0.7;
}

.clock {
  font-size: 11px;
}

/* MAIN */
.wrapper {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 55px);
  padding: 10px;
  gap: 8px;
}

/* INPUT */
.form {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

input {
  padding: 8px;
  background: black;
  border: 1px solid #00ff88;
  color: #00ff88;
  font-size: 13px;
}

button {
  padding: 10px;
  background: #003311;
  border: 1px solid #00ff88;
  color: #00ff88;
}

/* 🔥 LOG WINDOW FIXED POSITION (TIDAK NEMPEL BAWAH) */
.log {
  height: 42vh;          /* 🔥 penting: tidak full tinggi */
  margin-bottom: 18px;   /* 🔥 jarak bawah HP */
  border: 1px solid #00ff88;
  padding: 8px;
  overflow-y: auto;
  background: rgba(0,255,136,0.05);
  font-size: 12px;
}

/* scrollbar */
.log::-webkit-scrollbar {
  width: 4px;
}
.log::-webkit-scrollbar-thumb {
  background: #00ff88;
}

/* READY POSITION FIX (biar tidak “ketarik ke bawah”) */
#log {
  min-height: 200px;
}
</style>

</head>

<body>

<div class="header">
  <div class="title">Dwellers Tracker</div>
  <div class="version">V1.0</div>
  <div class="clock" id="clock"></div>
</div>

<div class="wrapper">

<div class="form">

<input id="level" placeholder="Level">
<input id="endurance" placeholder="Endurance">
<input id="luck" placeholder="Luck">
<input id="stim" placeholder="Stimpack">
<input id="rad" placeholder="RadAway">
<input id="weaponMin" placeholder="Weapon Min">
<input id="weaponMax" placeholder="Weapon Max">
<input id="buffer" placeholder="Notif Buffer" value="30">

<button id="btn">ACTIVATE</button>

</div>

<div class="log" id="log">>> READY</div>

</div>

<script>

// CLOCK
setInterval(()=>{
  document.getElementById("clock").innerText =
    new Date().toLocaleString();
},1000);


// TYPE LOG
function typeLog(text){
  let i = 0;
  const el = document.getElementById("log");
  el.innerText = "";

  function step(){
    if(i < text.length){
      el.innerText += text[i++];
      el.scrollTop = el.scrollHeight;
      setTimeout(step, 5);
    }
  }
  step();
}


// BUTTON
window.onload = () => {
  document.getElementById("btn").addEventListener("click", simulate);
};


// SIMULATION CORE
function simulate(){

let log = ">> SIMULATION START\n\n";

let L = Number(level.value) || 1;
let E = Number(endurance.value) || 1;
let Luck = Number(luck.value) || 1;
let S = Number(stim.value) || 0;
let R = Number(rad.value) || 0;
let buffer = Number(buffer.value) || 30;

let maxHP = 100 + (L * (3 + E * 0.8));
let hp = maxHP;

let baseDamage = 0.6;

let stim = S;
let rad = R;
let time = 0;

let crit = 0.08 + Luck * 0.015;
let dodge = 0.03 + Luck * 0.01;

log += "HP: " + Math.floor(hp) + "\n\n";

while(hp > 0 && time < 300000){

let minute = time / 60;
let scaling = 1 + (minute * 0.006);
let dmgRate = baseDamage * scaling;

if(Math.random() > 0.3){
  time += 12 + Math.random()*15;
  log += "idle...\n";
  continue;
}

let fightTime = 2 + Math.random()*3;
let dmg = dmgRate * fightTime;

if(Math.random() < crit){
  dmg *= 1.4;
  log += "crit!\n";
}

if(Math.random() < dodge){
  dmg = 0;
  log += "dodged!\n";
}

hp -= dmg;

if(hp < maxHP*0.4 && stim > 0){
  hp += 80;
  stim--;
  log += "stim\n";
}

if(hp < maxHP*0.6 && rad > 0){
  hp += 40;
  rad--;
  log += "rad\n";
}

time += fightTime + (10 + Math.random()*15);

log += "t:" + Math.floor(time/60) + "m hp:" + Math.floor(hp) + "\n";

if(hp <= 0) break;
}

let survive = Math.floor(time/60);
if(survive < 1) survive = 1;

let now = new Date();
let death = new Date(now.getTime() + survive*60000);

log += "\nRESULT\n";
log += "survive: " + survive + " min\n";
log += "death: " + death.toLocaleString();

typeLog(log);

}

</script>

</body>
</html>
