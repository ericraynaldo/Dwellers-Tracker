<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<!-- 🔥 PWA FULLSCREEN SUPPORT -->
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Dwellers Tracker</title>

<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden; /* 🔥 lock scroll */
  font-family: "Courier New", monospace;
  background: black;
  color: #00ff88;
}

/* HEADER */
.header {
  height: 60px;
  padding: 10px;
  background: #001a0d;
  border-bottom: 2px solid #00ff88;
}

.title {
  font-size: 16px;
}

.clock {
  font-size: 12px;
}

/* MAIN WRAPPER */
.wrapper {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 60px);
  padding: 10px;
  gap: 10px;
}

/* INPUT PANEL */
.form {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

input {
  padding: 8px;
  background: black;
  border: 1px solid #00ff88;
  color: #00ff88;
  font-size: 13px;
}

button {
  padding: 10px;
  background: #003311;
  border: 1px solid #00ff88;
  color: #00ff88;
  font-size: 14px;
  cursor: pointer;
}

/* 🔥 LOG WINDOW FIXED */
.log {
  flex: 1;
  border: 1px solid #00ff88;
  padding: 10px;
  overflow-y: auto;
  white-space: pre-line;
  font-size: 12px;
  background: rgba(0,255,136,0.05);
}

/* scroll bar */
.log::-webkit-scrollbar {
  width: 4px;
}
.log::-webkit-scrollbar-thumb {
  background: #00ff88;
}
</style>

</head>

<body>

<div class="header">
  <div class="title">Dwellers Tracker</div>
  <div class="clock" id="clock"></div>
</div>

<div class="wrapper">

<div class="form">

<input id="level" placeholder="Level">
<input id="endurance" placeholder="Endurance">
<input id="luck" placeholder="Luck">
<input id="stim" placeholder="Stimpack">
<input id="rad" placeholder="RadAway">
<input id="weaponMin" placeholder="Weapon Min">
<input id="weaponMax" placeholder="Weapon Max">
<input id="buffer" placeholder="Notif Buffer" value="30">

<button id="activateBtn">ACTIVATE</button>

</div>

<div class="log" id="log">>> READY</div>

</div>

<script>

// CLOCK
setInterval(()=>{
  document.getElementById("clock").innerText =
    new Date().toLocaleString();
},1000);


// TYPE LOG SAFE
function typeLog(text){
  let i = 0;
  const el = document.getElementById("log");
  el.innerText = "";

  function step(){
    if(i < text.length){
      el.innerText += text[i++];
      el.scrollTop = el.scrollHeight; // auto scroll
      setTimeout(step, 5);
    }
  }
  step();
}


// 🔥 FIXED EVENT BIND (INI YANG BIKIN TOMBOL MATI SEBELUMNYA)
window.addEventListener("load", () => {
  document.getElementById("activateBtn").addEventListener("click", runSim);
});


// SIMULATION CORE (REALISTIC MODEL)
function runSim(){

let log = ">> SIMULATION START\n\n";

// INPUT SAFE
let L = Number(document.getElementById("level").value) || 1;
let E = Number(document.getElementById("endurance").value) || 1;
let Luck = Number(document.getElementById("luck").value) || 1;
let S = Number(document.getElementById("stim").value) || 0;
let R = Number(document.getElementById("rad").value) || 0;
let minW = Number(document.getElementById("weaponMin").value) || 1;
let maxW = Number(document.getElementById("weaponMax").value) || 1;
let buffer = Number(document.getElementById("buffer").value) || 30;

// HP MODEL (STABLE)
let maxHP = 100 + (L * (3 + E * 0.8));
let hp = maxHP;

// BASE DAMAGE (REAL DATA BASED)
let baseDamage = 0.6;

// LUCK SYSTEM
let crit = 0.08 + Luck * 0.015;
let dodge = 0.03 + Luck * 0.01;

let stim = S;
let rad = R;
let time = 0;

log += "HP: " + Math.floor(hp) + "\n";
log += "BASE DMG: " + baseDamage + "\n\n";

while(hp > 0 && time < 300000){

let minute = time / 60;

// SLOW SCALING
let scaling = 1 + (minute * 0.006);
let dmgRate = baseDamage * scaling;

// ENCOUNTER (LOW FREQUENCY)
if(Math.random() > 0.28){
  time += 12 + Math.random()*18;
  log += "idle...\n";
  continue;
}

// FIGHT
let fightTime = 2 + Math.random()*3;
let dmg = dmgRate * fightTime;

// CRIT
if(Math.random() < crit){
  dmg *= 1.4;
  log += "crit!\n";
}

// DODGE
if(Math.random() < dodge){
  dmg = 0;
  log += "dodged!\n";
}

hp -= dmg;

// HEAL
if(hp < maxHP*0.4 && stim > 0){
  hp += 80;
  stim--;
  log += "stim\n";
}

if(hp < maxHP*0.6 && rad > 0){
  hp += 40;
  rad--;
  log += "rad\n";
}

// TIME
time += fightTime + (10 + Math.random()*15);

log += "t:" + Math.floor(time/60) + "m hp:" + Math.floor(hp) + "\n";

if(hp <= 0) break;
}

// RESULT
let survive = Math.floor(time/60);
if(survive < 1) survive = 1;

let now = new Date();
let death = new Date(now.getTime() + survive * 60000);

let notif = survive - buffer;
if(notif < 1) notif = 1;

let alert = new Date(now.getTime() + notif * 60000);

log += "\nRESULT\n";
log += "survive: " + survive + " min\n";
log += "death: " + death.toLocaleString() + "\n";
log += "alert: " + alert.toLocaleString();

typeLog(log);

}

</script>

</body>
</html>
