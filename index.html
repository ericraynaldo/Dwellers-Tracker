<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dwellers Tracker</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #ffffff;
  color: #000000;
  margin: 0;
}

.header {
  background: #2563eb;
  color: white;
  text-align: center;
  padding: 20px;
  font-size: 22px;
  font-weight: bold;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #f1f5f9;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 5px 0 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  background: #2563eb;
  border: none;
  border-radius: 10px;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.result {
  background: #e2e8f0;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">
  Dwellers Tracker
</div>

<div class="container">

<div id="clock"></div>

<div class="card">

<label>Level Dweller</label>
<input type="number" id="level">

<label>Endurance</label>
<input type="number" id="endurance">

<label>Stimpack</label>
<input type="number" id="stim">

<label>RadAway</label>
<input type="number" id="rad">

<label>Weapon Min Damage</label>
<input type="number" id="weaponMin">

<label>Weapon Max Damage</label>
<input type="number" id="weaponMax">

<label>Notif sebelum mati (menit)</label>
<input type="number" id="buffer" value="30">

<button onclick="calculate()">Calculate</button>

<div class="result" id="output"></div>

</div>
</div>

<script>

// ⏰ REALTIME CLOCK
function updateClock() {
  let now = new Date();
  document.getElementById("clock").innerHTML =
    now.toLocaleString();
}
setInterval(updateClock, 1000);
updateClock();


// 🔥 SIMULATION ENGINE
function calculate() {

  let L = +document.getElementById("level").value || 1;
  let E = +document.getElementById("endurance").value || 1;
  let S = +document.getElementById("stim").value || 0;
  let R = +document.getElementById("rad").value || 0;
  let minW = +document.getElementById("weaponMin").value || 1;
  let maxW = +document.getElementById("weaponMax").value || 1;
  let buffer = +document.getElementById("buffer").value || 30;

  // 🔫 average weapon damage
  let playerDPS = (minW + maxW) / 2;

  // ❤️ HP SYSTEM
  let maxHP = 105 + (L * 10) + (E * 20);
  let hp = maxHP;

  let stim = S;
  let rad = R;

  let time = 0;

  while (hp > 0 && time < 200000) {

    let minute = time / 60;
    let difficulty = 1 + (minute * 0.05);

    // 👾 RNG MUSUH
    let rand = Math.random();
    let enemyHP, enemyDPS;

    if (rand < 0.5) {
      enemyHP = 20 * difficulty;
      enemyDPS = 1.5 * difficulty;
    } else if (rand < 0.8) {
      enemyHP = 40 * difficulty;
      enemyDPS = 3 * difficulty;
    } else {
      enemyHP = 70 * difficulty;
      enemyDPS = 5 * difficulty;
    }

    let fightTime = enemyHP / playerDPS;
    let damageTaken = enemyDPS * fightTime;

    hp -= damageTaken;

    // 💉 stimpack auto
    if (hp < maxHP * 0.3 && stim > 0) {
      hp += 100;
      stim--;
    }

    // ☢️ radaway
    if (hp < maxHP * 0.5 && rad > 0) {
      hp += 50;
      rad--;
    }

    time += fightTime;

    if (hp <= 0) break;
  }

  let survivalMinutes = Math.floor(time / 60);
  if (survivalMinutes < 1) survivalMinutes = 1;

  let now = new Date();

  let deathTime = new Date(now.getTime() + survivalMinutes * 60000);

  let notifMinutes = survivalMinutes - buffer;
  if (notifMinutes < 1) notifMinutes = 1;

  let notifTime = new Date(now.getTime() + notifMinutes * 60000);

  document.getElementById("output").innerHTML =
    "⏱ Bertahan: <b>" + survivalMinutes + " menit</b><br><br>" +
    "💀 Estimasi mati:<br><b>" + deathTime.toLocaleString() + "</b><br><br>" +
    "🔔 Notif:<br><b>" + notifTime.toLocaleString() + "</b>";

  startNotification(notifMinutes);
}


// 🔔 NOTIFICATION
function startNotification(minutes) {

  if (Notification.permission !== "granted") {
    Notification.requestPermission();
  }

  setTimeout(() => {
    new Notification("⚠️ Dweller Warning", {
      body: "Segera recall dweller!"
    });
  }, minutes * 60000);
}

</script>

</body>
</html>
