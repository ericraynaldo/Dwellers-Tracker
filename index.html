<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dwellers Tracker</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: "Courier New", monospace;
  background: black;
  color: #00ff88;
  overflow-x: hidden;
}

.header {
  padding: 12px;
  background: #001a0d;
  border-bottom: 2px solid #00ff88;
}

.title { font-size: 16px; }

.clock { font-size: 12px; margin-top: 5px; }

.container { padding: 12px; }

.form {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

input {
  padding: 10px;
  background: black;
  color: #00ff88;
  border: 1px solid #00ff88;
  font-size: 14px;
}

button {
  padding: 12px;
  background: #003311;
  color: #00ff88;
  border: 1px solid #00ff88;
  font-size: 14px;
  cursor: pointer;
}

button:active {
  background: #005522;
}

.log {
  margin-top: 15px;
  white-space: pre-line;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">Dwellers Tracker</div>
  <div class="clock" id="clock"></div>
</div>

<div class="container">

<div class="form">

<input id="level" placeholder="Level">
<input id="endurance" placeholder="Endurance">
<input id="luck" placeholder="Luck">
<input id="stim" placeholder="Stimpack">
<input id="rad" placeholder="RadAway">
<input id="weaponMin" placeholder="Weapon Min Damage">
<input id="weaponMax" placeholder="Weapon Max Damage">
<input id="buffer" placeholder="Notif Buffer (min)" value="30">

<button id="activateBtn">ACTIVATE</button>

</div>

<div class="log" id="log">>> READY</div>

</div>

<script>

// CLOCK
setInterval(() => {
  document.getElementById("clock").innerText = new Date().toLocaleString();
}, 1000);


// TYPEWRITER
function typeLog(text){
  let i = 0;
  const el = document.getElementById("log");
  el.innerText = "";

  function step(){
    if(i < text.length){
      el.innerText += text[i++];
      setTimeout(step, 6);
    }
  }
  step();
}


// BUTTON (FIXED SAFE BIND)
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("activateBtn").addEventListener("click", simulate);
});


// SIMULATION (DATA BASED FIXED MODEL)
function simulate(){

let L = Number(document.getElementById("level").value) || 1;
let E = Number(document.getElementById("endurance").value) || 1;
let Luck = Number(document.getElementById("luck").value) || 1;
let S = Number(document.getElementById("stim").value) || 0;
let R = Number(document.getElementById("rad").value) || 0;
let minW = Number(document.getElementById("weaponMin").value) || 1;
let maxW = Number(document.getElementById("weaponMax").value) || 1;
let buffer = Number(document.getElementById("buffer").value) || 30;

let log = ">> SIMULATION START\n\n";

// HP MODEL (BASED ON REAL DATA STYLE)
let maxHP = 100 + (L * (3 + E * 0.8));
let hp = maxHP;

// DAMAGE MODEL (FROM YOUR REAL SAVE)
let baseDamage = 0.6; // FIXED EARLY GAME RATE

let stim = S;
let rad = R;
let time = 0;

// LUCK
let crit = 0.08 + Luck * 0.015;
let dodge = 0.03 + Luck * 0.01;

log += "HP: " + Math.floor(hp) + "\n";
log += "BASE DMG: " + baseDamage + "/min\n\n";

while(hp > 0 && time < 300000){

let minute = time / 60;

// SLOW SCALING (IMPORTANT FIX)
let scaling = 1 + (minute * 0.006);
let damageRate = baseDamage * scaling;

// LOW ENCOUNTER FREQUENCY
if(Math.random() > 0.28){
  time += 12 + Math.random() * 20;
  log += "idle...\n";
  continue;
}

// ENEMY HIT
let fightTime = 1.5 + Math.random() * 3;
let dmg = damageRate * fightTime;

// CRIT
if(Math.random() < crit){
  dmg *= 1.4;
  log += "crit!\n";
}

// DODGE
if(Math.random() < dodge){
  dmg = 0;
  log += "dodged!\n";
}

hp -= dmg;

// HEAL LOGIC
if(hp < maxHP * 0.4 && stim > 0){
  hp += 80;
  stim--;
  log += "stim\n";
}

if(hp < maxHP * 0.6 && rad > 0){
  hp += 40;
  rad--;
  log += "rad\n";
}

// TIME ADVANCE
time += fightTime + (8 + Math.random() * 15);

log += "t:" + Math.floor(time/60) + "m hp:" + Math.floor(hp) + "\n";

if(hp <= 0) break;
}

// RESULT
let survive = Math.floor(time / 60);
if(survive < 1) survive = 1;

let now = new Date();
let death = new Date(now.getTime() + survive * 60000);

let notif = survive - buffer;
if(notif < 1) notif = 1;

let notifTime = new Date(now.getTime() + notif * 60000);

log += "\nRESULT\n";
log += "survive: " + survive + " min\n";
log += "death: " + death.toLocaleString() + "\n";
log += "alert: " + notifTime.toLocaleString();

// OUTPUT
typeLog(log);

}

</script>

</body>
</html>
