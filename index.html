<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dwellers Tracker</title>

<style>
body {
  margin: 0;
  font-family: "Courier New", monospace;
  background: #000;
  color: #00ff88;
}

/* HEADER */
.header {
  background: #001a0d;
  padding: 10px 15px;
  border-bottom: 1px solid #00ff88;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
}

.title { font-size: 14px; }
.clock { font-size: 11px; }

/* MAIN */
.main {
  display: flex;
  flex-wrap: wrap;
}

/* LEFT */
.left {
  width: 260px;
  max-width: 100%;
  padding: 10px;
  border-right: 1px solid #00ff88;
}

/* FORM GRID */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

input {
  padding: 6px;
  background: black;
  color: #00ff88;
  border: 1px solid #00ff88;
  font-size: 12px;
}

/* BUTTON */
button {
  width: 100%;
  margin-top: 8px;
  padding: 8px;
  background: #003311;
  color: #00ff88;
  border: 1px solid #00ff88;
  cursor: pointer;
}

button:hover {
  background: #005522;
}

/* RIGHT */
.right {
  flex: 1;
  padding: 10px;
}

.log {
  white-space: pre-line;
  font-size: 11px;
}

/* MOBILE */
@media (max-width: 768px) {
  .main { flex-direction: column; }

  .left {
    width: 100%;
    border-right: none;
    border-bottom: 1px solid #00ff88;
  }

  .right { width: 100%; }
}
</style>
</head>

<body>

<div class="header">
  <div class="title">Dwellers Tracker</div>
  <div class="clock" id="clock"></div>
</div>

<div class="main">

<div class="left">

<div class="form-grid">
<input id="level" placeholder="Lvl">
<input id="endurance" placeholder="End">

<input id="luck" placeholder="Luck">
<input id="stim" placeholder="Stim">

<input id="rad" placeholder="Rad">
<input id="weaponMin" placeholder="Min">

<input id="weaponMax" placeholder="Max">
<input id="buffer" placeholder="Notif" value="30">
</div>

<button id="calcBtn">ACTIVATE</button>

</div>

<div class="right">
<div class="log" id="log">>> Ready...</div>
</div>

</div>

<script>

// CLOCK
setInterval(()=>{
  document.getElementById("clock").innerText =
    new Date().toLocaleString();
},1000);

// BUTTON
document.getElementById("calcBtn").addEventListener("click", calculate);


// TYPE EFFECT
function typeLog(text, speed=10){
  let i=0;
  let out=document.getElementById("log");
  out.innerText="";
  function t(){
    if(i<text.length){
      out.innerText+=text[i++];
      setTimeout(t,speed);
    }
  }
  t();
}


// SIMULATION
function calculate(){

let log=">> Init...\n";

let L=+level.value||1;
let E=+endurance.value||1;
let Luck=+luck.value||1;
let S=+stim.value||0;
let R=+rad.value||0;
let minW=+weaponMin.value||1;
let maxW=+weaponMax.value||1;
let buffer=+buffer.value||30;

// HP (lebih realistis)
let hpPerLevel = 2.5 + (E * 0.5);
let maxHP = 105 + (L * hpPerLevel);
let hp=maxHP;

// DPS
let dps=(minW+maxW)/2;
if(dps<3)dps=3;

// LUCK
let crit = Math.min(0.1 + Luck*0.02,0.5);
let dodge = Math.min(0.05 + Luck*0.015,0.4);

let stim=S;
let rad=R;
let time=0;

log+="HP:"+Math.floor(maxHP)+"\n";
log+="DPS:"+dps+"\n\n";

while(hp>0 && time<200000){

let minute=time/60;
let diff=1+(minute*0.015);

let rand=Math.random();

let enemyHP = rand<0.6?20:rand<0.85?35:55;
let enemyDPS = rand<0.6?1:rand<0.85?1.8:3;

enemyHP*=diff;
enemyDPS*=diff;

let mult = Math.random()<crit?2:1;

let fight = enemyHP/(dps*mult);
if(fight>7)fight=7;

let dmg = enemyDPS*fight;

if(Math.random()<dodge){
  dmg=0;
  log+="dodge\n";
}

hp-=dmg;

if(hp<maxHP*0.35 && stim>0){
  hp+=100;
  stim--;
  log+="stim\n";
}

if(hp<maxHP*0.6 && rad>0){
  hp+=50;
  rad--;
  log+="rad\n";
}

let idle=6+Math.random()*12;
time+=fight+idle;

log+="t:"+Math.floor(time/60)+"m hp:"+Math.floor(hp)+"\n";

if(hp<=0)break;
}

// RESULT
let survive=Math.floor(time/60);
if(survive<1)survive=1;

let now=new Date();
let death=new Date(now.getTime()+survive*60000);

let notif=survive-buffer;
if(notif<1)notif=1;

let notifTime=new Date(now.getTime()+notif*60000);

log+="\nRESULT\n";
log+="survive:"+survive+"m\n";
log+="death:"+death.toLocaleString()+"\n";
log+="alert:"+notifTime.toLocaleString();

typeLog(log,8);

}

</script>

</body>
</html>
