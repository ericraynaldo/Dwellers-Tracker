<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dweller Survival Tracker</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}
.container { max-width: 500px; margin:auto; }

.header {
  text-align:center;
  margin-bottom:15px;
}

.card {
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

input, select {
  width:100%;
  padding:10px;
  margin:5px 0 10px;
  border-radius:8px;
  border:none;
}

button {
  width:100%;
  padding:12px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  color:white;
  font-weight:bold;
}

.result {
  background:#334155;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h2>Dweller Survival Tracker</h2>
  <div id="date"></div>
  <div id="clock"></div>
</div>

<div class="card">
<label>Level Dweller</label>
<input type="number" id="level">

<label>Endurance</label>
<input type="number" id="endurance">

<label>Stimpack</label>
<input type="number" id="stim">

<label>RadAway</label>
<input type="number" id="rad">

<label>Weapon</label>
<select id="weapon">
  <option value="5">Rusty (Low)</option>
  <option value="10">Normal</option>
  <option value="18">Rare</option>
  <option value="25">Legendary</option>
</select>

<label>Notif sebelum mati (menit)</label>
<input type="number" id="buffer" value="30">

<button onclick="calculate()">Calculate</button>

<div class="result" id="output"></div>
</div>

</div>

<script>

// ⏰ REALTIME CLOCK
function updateClock() {
  let now = new Date();

  document.getElementById("clock").innerHTML =
    now.toLocaleTimeString();

  document.getElementById("date").innerHTML =
    now.toLocaleDateString(undefined, {
      weekday: 'long',
      year: 'numeric',
      month: 'long',
      day: 'numeric'
    });
}
setInterval(updateClock, 1000);
updateClock();


// 🧠 CALCULATION
function calculate() {
  let L = +document.getElementById("level").value || 1;
  let E = +document.getElementById("endurance").value || 1;
  let S = +document.getElementById("stim").value || 0;
  let R = +document.getElementById("rad").value || 0;
  let W = +document.getElementById("weapon").value || 5;
  let buffer = +document.getElementById("buffer").value || 30;

  // HP SYSTEM
  let baseHP = 100 + (E * 25) + (L * 10);
  let heal = S * 70;
  let radProtect = R * 50;

  // DPS SYSTEM
  let baseDPS = 6 + (L * 0.5);
  let reduction = W * 0.35;

  let effectiveDPS = baseDPS - reduction;
  if (effectiveDPS < 1) effectiveDPS = 1;

  let totalHP = baseHP + heal + radProtect;

  let survivalSeconds = totalHP / effectiveDPS;
  let survivalMinutes = Math.floor(survivalSeconds / 60);

  // ⏱ waktu mati real
  let now = new Date();
  let deathTime = new Date(now.getTime() + survivalMinutes * 60000);

  // 🔔 notif sebelum mati
  let notifMinutes = survivalMinutes - buffer;
  if (notifMinutes < 1) notifMinutes = 1;

  let notifTime = new Date(now.getTime() + notifMinutes * 60000);

  document.getElementById("output").innerHTML =
    "⏱ Bertahan: <b>" + survivalMinutes + " menit</b><br><br>" +
    "💀 Estimasi mati:<br><b>" + deathTime.toLocaleString() + "</b><br><br>" +
    "🔔 Notif akan muncul:<br><b>" + notifTime.toLocaleString() + "</b>";

  startNotification(notifMinutes);
}


// 🔔 NOTIFICATION
function startNotification(minutes) {

  if (Notification.permission !== "granted") {
    Notification.requestPermission();
  }

  setTimeout(() => {
    new Notification("⚠️ Dweller Warning", {
      body: "Segera recall! Sudah mendekati batas aman!"
    });
  }, minutes * 60000);
}

</script>

</body>
</html>
