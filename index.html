<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Dwellers Tracker V1.0</title>

<link rel="manifest" href="manifest.json">

<style>

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: black;
  color: #00ff88;
  font-family: "Courier New", monospace;
  height: 100vh;
  overflow: hidden;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.header {
  padding: 10px;
  background: #001a0d;
  border-bottom: 2px solid #00ff88;
}

.input-section {
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

input, button {
  touch-action: manipulation;
}

input {
  padding: 8px;
  background: black;
  border: 1px solid #00ff88;
  color: #00ff88;
}

button {
  padding: 10px;
  background: #003311;
  border: 1px solid #00ff88;
  color: #00ff88;
}

.log {
  flex: 1;
  margin: 0 10px;
  border: 1px solid #00ff88;
  padding: 8px;
  overflow-y: auto;
  background: rgba(0,255,136,0.05);
  font-size: 12px;
}

.footer {
  padding: 10px;
  text-align: center;
  border-top: 2px solid #00ff88;
  background: #001a0d;
  font-size: 11px;
}

</style>

</head>

<body>

<div class="app">

<div class="header">
  <div>Dwellers Tracker</div>
  <div>V1.0</div>
  <div id="clock"></div>
</div>

<div class="input-section">

<input id="level" placeholder="Level">
<input id="endurance" placeholder="Endurance">
<input id="luck" placeholder="Luck">
<input id="stim" placeholder="Stimpack">
<input id="rad" placeholder="RadAway">

<button id="btn">ACTIVATE</button>

</div>

<div class="log" id="log">>> READY</div>

<div class="footer">
  Dwellers Tracker V1.0 — Wasteland Simulation Core
</div>

</div>

<script>

/* CLOCK */
setInterval(() => {
  document.getElementById("clock").innerText =
    new Date().toLocaleString();
}, 1000);

/* INPUT */
const val = (id) =>
  Number(document.getElementById(id)?.value || 0);

/* LOG SYSTEM (LIMITED + TYPEWRITER) */
const logEl = document.getElementById("log");
let logLines = [];
const MAX_LINES = 80;

/* TYPEWRITER QUEUE */
let queue = [];
let typing = false;

/* ADD LOG */
function addLog(text){
  queue.push(text);
  if(!typing) typeNext();
}

/* TYPE EFFECT */
function typeNext(){
  if(queue.length === 0){
    typing = false;
    return;
  }

  typing = true;
  let text = queue.shift();
  let i = 0;

  let line = document.createElement("div");
  logEl.appendChild(line);

  function step(){
    if(i < text.length){
      line.textContent += text[i++];
      setTimeout(step, 10);
    } else {
      finalize(line);
      typeNext();
    }
  }

  step();
}

/* LIMIT LOG MEMORY */
function finalize(line){
  logLines.push(line);

  if(logLines.length > MAX_LINES){
    let old = logLines.shift();
    old.remove();
  }

  // hanya scroll kalau user masih di bawah
  let nearBottom =
    logEl.scrollTop + logEl.clientHeight >= logEl.scrollHeight - 50;

  if(nearBottom){
    logEl.scrollTop = logEl.scrollHeight;
  }
}

/* SIMULATION */
document.getElementById("btn").addEventListener("click", simulate);

function simulate(){

let L = val("level") || 1;
let E = val("endurance") || 1;
let Luck = val("luck") || 1;
let S = val("stim") || 0;
let R = val("rad") || 0;

let maxHP = 100 + (L * (3 + E * 0.8));
let hp = maxHP;

let baseDamage = 0.6;
let stim = S;
let rad = R;
let time = 0;

let crit = 0.08 + Luck * 0.015;
let dodge = 0.03 + Luck * 0.01;

addLog(">> SIMULATION START");
addLog("HP: " + Math.floor(hp));

function step(){

if(hp <= 0 || time > 300000){
  finish();
  return;
}

let minute = time / 60;
let scaling = 1 + (minute * 0.006);
let dmgRate = baseDamage * scaling;

if(Math.random() > 0.3){
  time += 10 + Math.random()*15;
  addLog("idle...");
  setTimeout(step, 40);
  return;
}

let fightTime = 2 + Math.random()*3;
let dmg = dmgRate * fightTime;

if(Math.random() < crit){
  dmg *= 1.4;
  addLog("CRIT!");
}

if(Math.random() < dodge){
  dmg = 0;
  addLog("DODGED!");
}

hp -= dmg;

if(hp < maxHP*0.4 && stim > 0){
  hp += 80;
  stim--;
  addLog("stim used");
}

if(hp < maxHP*0.6 && rad > 0){
  hp += 40;
  rad--;
  addLog("rad used");
}

time += fightTime + (10 + Math.random()*15);

addLog(`t:${Math.floor(time/60)}m hp:${Math.floor(hp)}`);

setTimeout(step, 40);
}

function finish(){
  let survive = Math.max(1, Math.floor(time/60));
  let death = new Date(Date.now() + survive * 60000);

  addLog(" ");
  addLog("RESULT");
  addLog("survive: " + survive + " min");
  addLog("death: " + death.toLocaleString());
}

step();
}

</script>

</body>
</html>
