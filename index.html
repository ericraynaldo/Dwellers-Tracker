<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#000000">

<title>Dwellers Tracker V3.0</title>

<style>

* { box-sizing: border-box; }

body {
  margin: 0;
  background: black;
  color: #00ff88;
  font-family: monospace;
}

.app {
  padding: 10px;
}

input, button {
  width: 100%;
  margin: 5px 0;
  padding: 8px;
  background: black;
  color: #00ff88;
  border: 1px solid #00ff88;
}

.result {
  margin-top: 10px;
  padding: 10px;
  border: 1px solid #00ff88;
  min-height: 120px;
  white-space: pre-wrap;
}

</style>

</head>

<body>

<div class="app">

<input id="level" placeholder="Level">
<input id="endurance" placeholder="Endurance">
<input id="luck" placeholder="Luck">
<input id="stim" placeholder="Stimpack">
<input id="rad" placeholder="RadAway">
<input id="weaponMin" placeholder="Weapon Min">
<input id="weaponMax" placeholder="Weapon Max">

<button onclick="simulate()">SIMULATE</button>

<div class="result" id="result">READY</div>

</div>

<script>

const val = (id) =>
  Number(document.getElementById(id)?.value || 0);

/* TYPE EFFECT */
function type(text){
  const el = document.getElementById("result");
  el.innerText = "";

  let i = 0;
  function step(){
    if(i < text.length){
      el.innerText += text[i++];
      setTimeout(step, 8);
    }
  }
  step();
}

/* SIMULATION */
function simulate(){

let L = val("level") || 1;
let E = val("endurance") || 1;
let Luck = val("luck") || 1;

let stim = val("stim") || 0;
let rad = val("rad") || 0;

let wMin = val("weaponMin") || 1;
let wMax = val("weaponMax") || 1;

/* BASE STATS */
let level = L;
let maxHP = 100 + (level * (4 + E * 1.2));
let hp = maxHP;

let time = 0;

/* CORE LOOP */
while(hp > 0 && time < 10000){

/* STABILITY SYSTEM (ANTI EXTREME RNG) */
let encounterBase = 0.55; 
let encounterGrowth = time / 12000; // slow pressure increase
let encounterChance = Math.min(0.75, encounterBase + encounterGrowth);

/* WEAPON */
let weapon = (wMin + wMax) / 2;

/* DAMAGE MODEL */
let enduranceFactor = 1 - (E * 0.10); 
enduranceFactor = Math.max(0.5, enduranceFactor);

let luckVariance = 0.85 + (Math.random() * 0.3) + (Luck * 0.01);

/* DANGER CURVE (SMOOTH) */
let danger = 1 + (time / 2000);

/* BASE DAMAGE */
let dmg = (1.4 + weapon * 0.08) * enduranceFactor * luckVariance * danger;

/* ENCOUNTER */
if(Math.random() < encounterChance){

  // mild spike system (NOT extreme like before)
  if(Math.random() < 0.08){
    dmg *= 1.5;
  }

  hp -= dmg;

} else {
  // light recovery pacing (rest moments)
  if(Math.random() < 0.15){
    hp += 1.5; // tiny regen feel
    if(hp > maxHP) hp = maxHP;
  }
}

/* STIM */
if(hp < maxHP * 0.35 && stim > 0){
  hp += 60;
  stim--;
}

/* LEVEL UP */
if(Math.random() < 0.015){
  level++;
  maxHP = 100 + (level * (4 + E * 1.2));
  hp = maxHP;
}

/* TIME */
time += 12 + Math.random() * 10;

}

/* RESULT */
let surviveMin = Math.floor(time / 60);
if(surviveMin < 1) surviveMin = 1;

/* SOFT CAP CONTROL (ANTI 5 JAM BUG) */
if(surviveMin > 210){ 
  surviveMin = 120 + Math.floor(Math.random() * 60);
}

let death = new Date(Date.now() + surviveMin * 60000);

let h = Math.floor(surviveMin / 60);
let m = surviveMin % 60;

/* OUTPUT */
let result =
`YOUR DWELLER SURVIVAL ESTIMATE

≈ ${h} HOURS ${m} MINUTES

DEATH TIME:
${death.toLocaleString()}`;

type(result);

}

</script>

</body>
</html>
