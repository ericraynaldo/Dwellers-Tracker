<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dwellers Tracker</title>

<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  font-family: "Courier New", monospace;
  background: black;
  color: #00ff88;
  overflow-x: hidden;
}

/* HEADER */
.header {
  width: 100%;
  background: #001a0d;
  padding: 12px;
  border-bottom: 2px solid #00ff88;
}

.title {
  font-size: 16px;
}

.clock {
  font-size: 12px;
  margin-top: 5px;
}

/* CONTAINER */
.container {
  padding: 12px;
}

/* FORM */
.form {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

input {
  width: 100%;
  padding: 10px;
  background: black;
  color: #00ff88;
  border: 1px solid #00ff88;
  font-size: 14px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  background: #003311;
  color: #00ff88;
  border: 1px solid #00ff88;
  font-size: 14px;
  cursor: pointer;
}

button:active {
  background: #005522;
}

/* LOG */
.log {
  margin-top: 15px;
  white-space: pre-line;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">Dwellers Tracker</div>
  <div class="clock" id="clock"></div>
</div>

<div class="container">

<div class="form">

<input id="level" placeholder="Level">
<input id="endurance" placeholder="Endurance">
<input id="luck" placeholder="Luck">
<input id="stim" placeholder="Stimpack">
<input id="rad" placeholder="RadAway">
<input id="weaponMin" placeholder="Weapon Min Damage">
<input id="weaponMax" placeholder="Weapon Max Damage">
<input id="buffer" placeholder="Notif Buffer (min)" value="30">

<button id="btnActivate">ACTIVATE</button>

</div>

<div class="log" id="log">>> READY</div>

</div>

<script>

// CLOCK
setInterval(()=>{
  document.getElementById("clock").innerText =
    new Date().toLocaleString();
},1000);


// TYPEWRITER LOG (INI YANG HILANG SEBELUMNYA)
function typeLog(text){
  let i = 0;
  let out = document.getElementById("log");
  out.innerText = "";

  function step(){
    if(i < text.length){
      out.innerText += text[i++];
      setTimeout(step, 8);
    }
  }
  step();
}


// BUTTON
document.getElementById("btnActivate").addEventListener("click", simulate);


// SIMULATION FIXED MODEL
function simulate(){

let log = ">> WASTELAND SIMULATION (STABLE MODEL)\n\n";

// INPUT
let L = Number(level.value) || 1;
let E = Number(endurance.value) || 1;
let Luck = Number(luck.value) || 1;
let S = Number(stim.value) || 0;
let R = Number(rad.value) || 0;
let minW = Number(weaponMin.value) || 1;
let maxW = Number(weaponMax.value) || 1;
let buffer = Number(buffer.value) || 30;


// HP MODEL (FIXED)
let maxHP = 100 + (L * (3 + E * 0.8));
let hp = maxHP;

// DPS
let dps = (minW + maxW) / 2;
if(dps < 1) dps = 1;

// LUCK
let crit = 0.08 + Luck * 0.015;
let dodge = 0.03 + Luck * 0.01;

// BASE DAMAGE (FROM YOUR REAL DATA)
let baseDamagePerMin = 0.6; // 🔥 DIPERLAMBAT dari 0.9

let stim = S;
let rad = R;
let time = 0;

log += "HP START: " + Math.floor(maxHP) + "\n";
log += "BASE DMG: " + baseDamagePerMin + "/min\n\n";


while(hp > 0 && time < 300000){

let minute = time / 60;

// 🔥 SLOW SCALING (FIXED, LAMBAT)
let scaling = 1 + (minute * 0.006);
let damageRate = baseDamagePerMin * scaling;


// 🔥 ENCOUNTER SYSTEM (JARANG)
let encounterChance = 0.25; // lebih aman

if(Math.random() > encounterChance){
  let idle = 12 + Math.random() * 25;
  time += idle;
  log += "idle...\n";
  continue;
}


// ENEMY (LOW FREQUENCY HIT)
let enemyDamage = damageRate * (1 + Math.random() * 0.5);

// FIGHT TIME
let fightTime = 1.5 + Math.random() * 3;


// CRIT
if(Math.random() < crit){
  enemyDamage *= 1.4;
  log += "crit!\n";
}


// DODGE
if(Math.random() < dodge){
  enemyDamage = 0;
  log += "dodged!\n";
}

hp -= enemyDamage;


// HEAL LOGIC
if(hp < maxHP * 0.4 && stim > 0){
  hp += 80;
  stim--;
  log += "stim used\n";
}

if(hp < maxHP * 0.6 && rad > 0){
  hp += 40;
  rad--;
  log += "rad used\n";
}


// TIME ADVANCE
time += fightTime + (10 + Math.random() * 20);

log += "t:" + Math.floor(time/60) + "m hp:" + Math.floor(hp) + "\n";

if(hp <= 0) break;
}


// RESULT
let survive = Math.floor(time / 60);
if(survive < 1) survive = 1;

let now = new Date();
let death = new Date(now.getTime() + survive * 60000);

let notif = survive - buffer;
if(notif < 1) notif = 1;

let notifTime = new Date(now.getTime() + notif * 60000);


log += "\nRESULT\n";
log += "survive: " + survive + " min\n";
log += "death: " + death.toLocaleString() + "\n";
log += "alert: " + notifTime.toLocaleString();


// TYPE EFFECT BACK
typeLog(log);

}

</script>
</body>
</html>
