<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dwellers Tracker</title>

<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  font-family: "Courier New", monospace;
  background: black;
  color: #00ff88;
  overflow-x: hidden;
}

/* HEADER */
.header {
  width: 100%;
  background: #001a0d;
  padding: 12px;
  border-bottom: 2px solid #00ff88;
}

.title {
  font-size: 16px;
}

.clock {
  font-size: 12px;
  margin-top: 5px;
}

/* CONTAINER */
.container {
  padding: 12px;
}

/* FORM */
.form {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

input {
  width: 100%;
  padding: 10px;
  background: black;
  color: #00ff88;
  border: 1px solid #00ff88;
  font-size: 14px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  background: #003311;
  color: #00ff88;
  border: 1px solid #00ff88;
  font-size: 14px;
  cursor: pointer;
}

button:active {
  background: #005522;
}

/* LOG */
.log {
  margin-top: 15px;
  white-space: pre-line;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">Dwellers Tracker</div>
  <div class="clock" id="clock"></div>
</div>

<div class="container">

<div class="form">

<input id="level" placeholder="Level">
<input id="endurance" placeholder="Endurance">
<input id="luck" placeholder="Luck">
<input id="stim" placeholder="Stimpack">
<input id="rad" placeholder="RadAway">
<input id="weaponMin" placeholder="Weapon Min Damage">
<input id="weaponMax" placeholder="Weapon Max Damage">
<input id="buffer" placeholder="Notif Buffer (min)" value="30">

<button id="btnActivate">ACTIVATE</button>

</div>

<div class="log" id="log">>> READY</div>

</div>

<script>

// CLOCK
setInterval(()=>{
  document.getElementById("clock").innerText =
    new Date().toLocaleString();
},1000);


// BUTTON FIX (INI YANG SERING BIKIN ERROR)
document.getElementById("btnActivate").addEventListener("click", simulate);


// LOG FUNCTION
function printLog(text){
  document.getElementById("log").innerText = text;
}


// SIMULATION CORE
function simulate(){

let log=">> WASTELAND SIMULATION STARTED\n\n";

// INPUT (AMAN - SEMUA DI-CHECK)
let L = Number(document.getElementById("level").value) || 1;
let E = Number(document.getElementById("endurance").value) || 1;
let Luck = Number(document.getElementById("luck").value) || 1;
let S = Number(document.getElementById("stim").value) || 0;
let R = Number(document.getElementById("rad").value) || 0;
let minW = Number(document.getElementById("weaponMin").value) || 1;
let maxW = Number(document.getElementById("weaponMax").value) || 1;
let buffer = Number(document.getElementById("buffer").value) || 30;

// HP MODEL (REALISTIC BASED ON YOUR DATA)
let hpPerLevel = 2.5 + (E * 0.5);
let maxHP = 105 + (L * hpPerLevel);
let hp = maxHP;

// DPS
let dps = (minW + maxW) / 2;
if(dps < 2) dps = 2;

// LUCK SYSTEM
let crit = Math.min(0.1 + Luck*0.02, 0.35);
let dodge = Math.min(0.05 + Luck*0.01, 0.25);

// BASE DAMAGE FROM REAL SAVE DATA (~0.9 HP/min)
let baseDamage = 0.9;

let stim = S;
let rad = R;
let time = 0;

log += "HP: " + Math.floor(maxHP) + "\n";
log += "BASE DMG: " + baseDamage + "/min\n\n";

while(hp > 0 && time < 300000){

let minute = time / 60;

// SLOW SCALING (REALISTIC)
let scaling = 1 + (minute * 0.01);
let dmgRate = baseDamage * scaling;

// ENCOUNTER CHANCE
if(Math.random() > 0.45){
  time += 10 + Math.random()*20;
  log += "idle...\n";
  continue;
}

// ENEMY HIT
let fightTime = 2 + Math.random()*4;
let dmg = dmgRate * fightTime;

// CRIT
if(Math.random() < crit){
  dmg *= 1.5;
  log += "crit!\n";
}

// DODGE
if(Math.random() < dodge){
  dmg = 0;
  log += "dodged!\n";
}

hp -= dmg;

// HEAL SYSTEM
if(hp < maxHP*0.35 && stim > 0){
  hp += 100;
  stim--;
  log += "stim used\n";
}

if(hp < maxHP*0.6 && rad > 0){
  hp += 50;
  rad--;
  log += "rad used\n";
}

// TIME ADVANCE
time += fightTime + (6 + Math.random()*10);

log += "t:" + Math.floor(time/60) + "m hp:" + Math.floor(hp) + "\n";

if(hp <= 0) break;
}

// RESULT
let survive = Math.floor(time / 60);
if(survive < 1) survive = 1;

let now = new Date();
let death = new Date(now.getTime() + survive * 60000);

let notif = survive - buffer;
if(notif < 1) notif = 1;

let notifTime = new Date(now.getTime() + notif * 60000);

log += "\nRESULT\n";
log += "survive: " + survive + " min\n";
log += "death: " + death.toLocaleString() + "\n";
log += "alert: " + notifTime.toLocaleString();

printLog(log);

}

</script>

</body>
</html>
