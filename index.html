<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dwellers Tracker">

<title>Dwellers Tracker V1.0</title>

<link rel="manifest" href="manifest.json">

<style>

* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  background: black;
  color: #00ff88;
  font-family: "Courier New", monospace;
  min-height: 100vh;
}

/* APP LAYOUT */
.app {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* HEADER */
.header {
  padding: 10px;
  background: #001a0d;
  border-bottom: 2px solid #00ff88;
  position: sticky;
  top: 0;
}

.title { font-size: 15px; }
.version { font-size: 11px; opacity: 0.8; }
.clock { font-size: 11px; }

/* INPUT */
.input-section {
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

input {
  padding: 8px;
  background: black;
  border: 1px solid #00ff88;
  color: #00ff88;
  font-size: 13px;
}

button {
  padding: 10px;
  background: #003311;
  border: 1px solid #00ff88;
  color: #00ff88;
}

/* LOG WINDOW */
.log {
  flex: 1;
  margin: 0 10px;
  border: 1px solid #00ff88;
  padding: 8px;
  overflow-y: auto;
  background: rgba(0,255,136,0.05);
  font-size: 12px;
  min-height: 200px;
}

/* FOOTER */
.footer {
  padding: 10px;
  text-align: center;
  border-top: 2px solid #00ff88;
  background: #001a0d;
  font-size: 11px;
}

</style>

</head>

<body>

<div class="app">

<!-- HEADER -->
<div class="header">
  <div class="title">Dwellers Tracker</div>
  <div class="version">V1.0</div>
  <div class="clock" id="clock"></div>
</div>

<!-- INPUT -->
<div class="input-section">

<input id="level" placeholder="Level">
<input id="endurance" placeholder="Endurance">
<input id="luck" placeholder="Luck">
<input id="stim" placeholder="Stimpack">
<input id="rad" placeholder="RadAway">
<input id="weaponMin" placeholder="Weapon Min">
<input id="weaponMax" placeholder="Weapon Max">
<input id="buffer" placeholder="Notif Buffer (min)" value="30">

<button id="btn">ACTIVATE</button>

</div>

<!-- LOG -->
<div class="log" id="log">>> READY</div>

<!-- FOOTER -->
<div class="footer">
  Dwellers Tracker V1.0 — Wasteland Simulation Core
</div>

</div>

<script>

/* CLOCK */
setInterval(() => {
  document.getElementById("clock").innerText =
    new Date().toLocaleString();
}, 1000);

/* SAFE INPUT */
const val = (id) =>
  Number(document.getElementById(id)?.value || 0);

/* TYPE LOG (FIXED SCROLL ONLY) */
function typeLog(text){
  let i = 0;
  const el = document.getElementById("log");

  function step(){

    if(i === 0){
      el.innerText = "";
    }

    if(i < text.length){
      el.innerText += text[i++];

      // 🔥 FIX: scroll hanya jika user di bawah
      let nearBottom =
        el.scrollTop + el.clientHeight >= el.scrollHeight - 40;

      if(nearBottom){
        el.scrollTop = el.scrollHeight;
      }

      setTimeout(step, 4);
    }
  }

  step();
}

/* FIXED BUTTON */
document.addEventListener("DOMContentLoaded", () => {
  const btn = document.getElementById("btn");
  btn.addEventListener("click", simulate);
});

/* SIMULATION CORE (TIDAK DIUBAH SAMA SEKALI) */
function simulate(){

let log = ">> SIMULATION START\n\n";

let L = val("level") || 1;
let E = val("endurance") || 1;
let Luck = val("luck") || 1;
let S = val("stim") || 0;
let R = val("rad") || 0;
let buffer = val("buffer") || 30;

let maxHP = 100 + (L * (3 + E * 0.8));
let hp = maxHP;

let baseDamage = 0.6;

let stim = S;
let rad = R;
let time = 0;

let crit = 0.08 + Luck * 0.015;
let dodge = 0.03 + Luck * 0.01;

log += "HP: " + Math.floor(hp) + "\n\n";

while(hp > 0 && time < 300000){

let minute = time / 60;
let scaling = 1 + (minute * 0.006);
let dmgRate = baseDamage * scaling;

if(Math.random() > 0.3){
  time += 10 + Math.random()*15;
  log += "idle...\n";
  continue;
}

let fightTime = 2 + Math.random()*3;
let dmg = dmgRate * fightTime;

if(Math.random() < crit){
  dmg *= 1.4;
  log += "crit!\n";
}

if(Math.random() < dodge){
  dmg = 0;
  log += "dodged!\n";
}

hp -= dmg;

if(hp < maxHP*0.4 && stim > 0){
  hp += 80;
  stim--;
  log += "stim\n";
}

if(hp < maxHP*0.6 && rad > 0){
  hp += 40;
  rad--;
  log += "rad\n";
}

time += fightTime + (10 + Math.random()*15);

log += "t:" + Math.floor(time/60) + "m hp:" + Math.floor(hp) + "\n";

if(hp <= 0) break;
}

let survive = Math.floor(time/60);
if(survive < 1) survive = 1;

let death = new Date(Date.now() + survive * 60000);

log += "\nRESULT\n";
log += "survive: " + survive + " min\n";
log += "death: " + death.toLocaleString();

typeLog(log);
}

</script>

<!-- 🔥 PWA SERVICE WORKER (TIDAK SENTUH LOGIC) -->
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
