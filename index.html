<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dwellers Tracker</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Courier New", monospace;
  background: black;
  color: #00ff88;
  overflow: hidden; /* 🔥 FIX: halaman tidak bisa scroll */
}

/* HEADER */
.header {
  padding: 10px;
  background: #001a0d;
  border-bottom: 2px solid #00ff88;
}

.title {
  font-size: 16px;
}

.clock {
  font-size: 12px;
}

/* LAYOUT */
.container {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 60px);
  padding: 10px;
  gap: 10px;
}

/* INPUT PANEL */
.form {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

input {
  padding: 8px;
  background: black;
  border: 1px solid #00ff88;
  color: #00ff88;
}

button {
  padding: 10px;
  background: #003311;
  border: 1px solid #00ff88;
  color: #00ff88;
  cursor: pointer;
}

/* 🔥 LOG WINDOW (FIXED SCROLL AREA) */
.log {
  flex: 1;
  border: 1px solid #00ff88;
  padding: 10px;
  overflow-y: auto;   /* 🔥 SCROLL HANYA DI SINI */
  white-space: pre-line;
  font-size: 12px;
  background: rgba(0,255,136,0.05);
}

/* smooth scroll feel */
.log::-webkit-scrollbar {
  width: 6px;
}
.log::-webkit-scrollbar-thumb {
  background: #00ff88;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">Dwellers Tracker</div>
  <div class="clock" id="clock"></div>
</div>

<div class="container">

<div class="form">

<input id="level" placeholder="Level">
<input id="endurance" placeholder="Endurance">
<input id="luck" placeholder="Luck">
<input id="stim" placeholder="Stimpack">
<input id="rad" placeholder="RadAway">
<input id="weaponMin" placeholder="Weapon Min">
<input id="weaponMax" placeholder="Weapon Max">
<input id="buffer" placeholder="Notif Buffer" value="30">

<button id="btn">ACTIVATE</button>

</div>

<div class="log" id="log">>> READY</div>

</div>

<script>

// CLOCK
setInterval(()=>{
  document.getElementById("clock").innerText =
    new Date().toLocaleString();
},1000);


// TYPEWRITER (smooth + auto scroll)
function typeLog(text){
  let i = 0;
  let el = document.getElementById("log");
  el.innerText = "";

  function step(){
    if(i < text.length){
      el.innerText += text[i++];
      el.scrollTop = el.scrollHeight; // 🔥 AUTO SCROLL INSIDE BOX
      setTimeout(step, 5);
    }
  }
  step();
}


// BUTTON
document.getElementById("btn").addEventListener("click", simulate);


// SIMULATION FIXED MODEL
function simulate(){

let log = ">> SIMULATION START\n\n";

// INPUT SAFE
let L = Number(level.value) || 1;
let E = Number(endurance.value) || 1;
let Luck = Number(luck.value) || 1;
let S = Number(stim.value) || 0;
let R = Number(rad.value) || 0;
let minW = Number(weaponMin.value) || 1;
let maxW = Number(weaponMax.value) || 1;
let buffer = Number(buffer.value) || 30;

// HP MODEL
let maxHP = 100 + (L * (3 + E * 0.8));
let hp = maxHP;

// DAMAGE BASE (REALISTIC EARLY GAME)
let baseDamage = 0.6;

let stim = S;
let rad = R;
let time = 0;

// LUCK
let crit = 0.08 + Luck * 0.015;
let dodge = 0.03 + Luck * 0.01;

log += "HP: " + Math.floor(hp) + "\n";
log += "BASE DMG: " + baseDamage + "\n\n";

while(hp > 0 && time < 300000){

let minute = time / 60;

// SLOW SCALING
let scaling = 1 + (minute * 0.006);
let dmgRate = baseDamage * scaling;

// ENCOUNTER (JARANG)
if(Math.random() > 0.28){
  time += 10 + Math.random()*20;
  log += "idle...\n";
  continue;
}

// FIGHT
let fightTime = 2 + Math.random()*3;
let dmg = dmgRate * fightTime;

// CRIT
if(Math.random() < crit){
  dmg *= 1.4;
  log += "crit!\n";
}

// DODGE
if(Math.random() < dodge){
  dmg = 0;
  log += "dodged!\n";
}

hp -= dmg;

// HEAL
if(hp < maxHP*0.4 && stim > 0){
  hp += 80;
  stim--;
  log += "stim\n";
}

if(hp < maxHP*0.6 && rad > 0){
  hp += 40;
  rad--;
  log += "rad\n";
}

// TIME
time += fightTime + (10 + Math.random()*15);

log += "t:" + Math.floor(time/60) + "m hp:" + Math.floor(hp) + "\n";

if(hp <= 0) break;
}

// RESULT
let survive = Math.floor(time/60);
if(survive < 1) survive = 1;

let now = new Date();
let death = new Date(now.getTime() + survive*60000);

let notif = survive - buffer;
if(notif < 1) notif = 1;

let alert = new Date(now.getTime() + notif*60000);

log += "\nRESULT\n";
log += "survive: " + survive + " min\n";
log += "death: " + death.toLocaleString() + "\n";
log += "alert: " + alert.toLocaleString();

typeLog(log);

}

</script>

</body>
</html>
