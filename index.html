<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="theme-color" content="#000000">

<title>Dwellers Tracker V2.0</title>

<style>

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: black;
  color: #00ff88;
  font-family: "Courier New", monospace;
}

.app {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.header {
  padding: 10px;
  background: #001a0d;
  border-bottom: 2px solid #00ff88;
}

.title { font-size: 15px; }
.version { font-size: 11px; opacity: 0.8; }

.input-section {
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

input {
  padding: 8px;
  background: black;
  border: 1px solid #00ff88;
  color: #00ff88;
}

button {
  padding: 10px;
  background: #003311;
  border: 1px solid #00ff88;
  color: #00ff88;
}

/* RESULT BOX */
.result {
  margin: 10px;
  padding: 12px;
  border: 1px solid #00ff88;
  min-height: 120px;
  white-space: pre-wrap;
}

.footer {
  margin-top: auto;
  padding: 10px;
  text-align: center;
  border-top: 2px solid #00ff88;
  font-size: 11px;
}

</style>

</head>

<body>

<div class="app">

<div class="header">
  <div class="title">Dwellers Tracker</div>
  <div class="version">V2.0 RESULT ENGINE</div>
</div>

<div class="input-section">

<input id="level" placeholder="Level">
<input id="endurance" placeholder="Endurance">
<input id="luck" placeholder="Luck">
<input id="stim" placeholder="Stimpack">
<input id="rad" placeholder="RadAway">

<input id="weaponMin" placeholder="Weapon Min">
<input id="weaponMax" placeholder="Weapon Max">

<button onclick="simulate()">SIMULATE</button>

</div>

<div class="result" id="result">>> READY</div>

<div class="footer">
  Wasteland Simulation Core
</div>

</div>

<script>

const val = (id) =>
  Number(document.getElementById(id)?.value || 0);

/* 🔥 TYPE ANIMATION ONLY FOR RESULT */
function typeText(text){
  const el = document.getElementById("result");
  el.innerText = "";

  let i = 0;

  function step(){
    if(i < text.length){
      el.innerText += text[i++];
      setTimeout(step, 10);
    }
  }

  step();
}

/* SIMULATION CORE */
function simulate(){

let L = val("level") || 1;
let E = val("endurance") || 1;
let Luck = val("luck") || 1;

let wMin = val("weaponMin") || 1;
let wMax = val("weaponMax") || 1;

/* HP SYSTEM */
let level = L;
let maxHP = 100 + (level * (3 + E * 0.8));
let hp = maxHP;

let time = 0;
let rad = val("rad") || 0;
let stim = val("stim") || 0;

/* SIM LOOP (FAST CALC, NO LOG SPAM) */
while(hp > 0 && time < 12000){

let danger = 1 + (time / 1400);
let weapon = (wMin + wMax) / 2;

let enduranceReduce = Math.max(0.55, 1 - (E * 0.08));
let luckVar = 0.8 + Math.random() * (1 + Luck * 0.02);

let encounter = Math.random() < (0.65 + time / 9000);

let dmg = (1.3 + weapon * 0.07)
        * enduranceReduce
        * luckVar
        * danger;

if(encounter){
  if(Math.random() < 0.1){
    dmg *= 1.8;
  }
  hp -= dmg;
}

if(hp < maxHP * 0.35 && stim > 0){
  hp += 60;
  stim--;
}

time += 10 + Math.random() * 10;

/* LEVEL UP HEAL */
if(Math.random() < 0.02){
  level++;
  maxHP = 100 + (level * (3 + E * 0.8));
  hp = maxHP;
}

}

/* RESULT CALC */
let surviveMin = Math.floor(time / 60);
if(surviveMin < 1) surviveMin = 1;

let deathDate = new Date(Date.now() + surviveMin * 60000);

let d = Math.floor(surviveMin / 1440);
let h = Math.floor((surviveMin % 1440) / 60);
let m = surviveMin % 60;

/* FINAL TEXT */
let result =
`YOUR DWELLER WILL SURVIVE APPROXIMATELY

${h} HOURS ${m} MINUTES
(${d} DAYS TOTAL TIME)

DEATH DATE:
${deathDate.toLocaleString()}`;

/* TYPE IT */
typeText(result);

}

</script>

</body>
</html>
