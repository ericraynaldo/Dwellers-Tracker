<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dwellers Tracker</title>

<style>
body {
  margin: 0;
  font-family: "Courier New", monospace;
  background: #000;
  color: #00ff88;
}

.header {
  background: #001a0d;
  padding: 15px;
  font-size: 20px;
  text-align: center;
  border-bottom: 1px solid #00ff88;
  position: relative;
}

.clock {
  position: absolute;
  right: 15px;
  top: 15px;
  font-size: 12px;
}

.main {
  display: flex;
  height: calc(100vh - 60px);
}

.left {
  width: 300px;
  padding: 20px;
  border-right: 1px solid #00ff88;
}

.right {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

input {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
  background: black;
  color: #00ff88;
  border: 1px solid #00ff88;
}

button {
  width: 100%;
  padding: 10px;
  background: #003311;
  color: #00ff88;
  border: 1px solid #00ff88;
  cursor: pointer;
}

button:hover {
  background: #005522;
}

.log {
  white-space: pre-line;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="header">
  Dwellers Tracker Terminal
  <div class="clock" id="clock"></div>
</div>

<div class="main">

<div class="left">
<label>Level</label>
<input type="number" id="level">

<label>Endurance</label>
<input type="number" id="endurance">

<label>Stimpack</label>
<input type="number" id="stim">

<label>RadAway</label>
<input type="number" id="rad">

<label>Weapon Min</label>
<input type="number" id="weaponMin">

<label>Weapon Max</label>
<input type="number" id="weaponMax">

<label>Notif Buffer (min)</label>
<input type="number" id="buffer" value="30">

<button id="calcBtn">RUN SIMULATION</button>
</div>

<div class="right">
<div class="log" id="log">>> System Ready...</div>
</div>

</div>

<script>

// ⏰ CLOCK
setInterval(() => {
  document.getElementById("clock").innerText =
    new Date().toLocaleString();
}, 1000);


// 🎯 BUTTON EVENT (ANTI BUG)
document.getElementById("calcBtn").addEventListener("click", calculate);


// 🧠 SIMULATION
function calculate() {

  let log = ">> Initializing simulation...\n";

  let L = parseInt(document.getElementById("level").value) || 1;
  let E = parseInt(document.getElementById("endurance").value) || 1;
  let S = parseInt(document.getElementById("stim").value) || 0;
  let R = parseInt(document.getElementById("rad").value) || 0;
  let minW = parseInt(document.getElementById("weaponMin").value) || 1;
  let maxW = parseInt(document.getElementById("weaponMax").value) || 1;
  let bufferVal = parseInt(document.getElementById("buffer").value) || 30;

  let playerDPS = (minW + maxW) / 2;
  if (playerDPS < 5) playerDPS = 5;

  let maxHP = 120 + (L * 12) + (E * 25);
  let hp = maxHP;

  let stim = S;
  let rad = R;
  let time = 0;

  log += ">> HP: " + maxHP + "\n";
  log += ">> DPS: " + playerDPS + "\n\n";

  while (hp > 0 && time < 200000) {

    let minute = time / 60;
    let difficulty = 1 + (minute * 0.04);

    let rand = Math.random();

    let enemyHP = rand < 0.5 ? 25 : rand < 0.8 ? 45 : 70;
    let enemyDPS = rand < 0.5 ? 1.5 : rand < 0.8 ? 3 : 5;

    enemyHP *= difficulty;
    enemyDPS *= difficulty;

    let fightTime = enemyHP / playerDPS;
    if (fightTime > 8) fightTime = 8;

    let damage = enemyDPS * fightTime;
    hp -= damage;

    if (hp < maxHP * 0.35 && stim > 0) {
      hp += 120;
      stim--;
      log += ">> Stimpack used\n";
    }

    if (hp < maxHP * 0.6 && rad > 0) {
      hp += 60;
      rad--;
      log += ">> RadAway used\n";
    }

    let idle = Math.random() * 5;
    time += fightTime + idle;

    log += ">> Time: " + Math.floor(time/60) + "m | HP: " + Math.floor(hp) + "\n";

    if (hp <= 0) break;
  }

  let survival = Math.floor(time / 60);
  if (survival < 1) survival = 1;

  let now = new Date();
  let death = new Date(now.getTime() + survival * 60000);

  let notif = survival - bufferVal;
  if (notif < 1) notif = 1;

  let notifTime = new Date(now.getTime() + notif * 60000);

  log += "\n>> RESULT\n";
  log += ">> Survival: " + survival + " minutes\n";
  log += ">> Death: " + death.toLocaleString() + "\n";
  log += ">> Alert: " + notifTime.toLocaleString();

  document.getElementById("log").innerText = log;
}

</script>

</body>
</html>
